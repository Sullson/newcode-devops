name: frontend-deploy

# Cheap, always-on path: build the Astro static site and ship it to Azure
# Static Web Apps (free tier). This front is up 24/7; the AKS proof is on-demand.
on:
  workflow_dispatch: # manual redeploy of the front
  push:
    branches: [main]
    paths:
      - "app/**"

permissions:
  contents: read

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: build-and-deploy-swa
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 (pinned 2026-06-18)
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build Astro static output
        working-directory: app
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        # SWA deploy token is the supported auth for the Oryx deploy action;
        # OIDC is not yet a first-class path for SWA content uploads.
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1 (pinned 2026-06-18)
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOY_TOKEN }}
          action: upload
          # Built above (npm ci && npm run build); upload that output directly.
          # With skip_app_build the action treats app_location as the artifact
          # dir, so point it at app/dist (where index.html lives).
          app_location: app/dist
          output_location: ""
          skip_app_build: "true"
