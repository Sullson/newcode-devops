name: infra

# Terraform plan on PR, apply only via manual dispatch (gated by the
# "production" environment). Backend is azurerm; auth is OIDC, no SP secrets.
on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Serialize anything touching shared TF state.
  group: terraform-state
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  ARM_USE_OIDC: "true"

defaults:
  run:
    working-directory: terraform

jobs:
  plan:
    name: fmt-validate-plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC to Azure
      pull-requests: write # plan comment
    env:
      # azurerm provider auth via GitHub OIDC (no SP secret). ARM_USE_OIDC is set
      # at workflow level. Provider/backend still need which identity + where.
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # cloudflare provider reads this env var directly (tunnel + DNS).
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Required TF variables that have no default.
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        # TODO: ratchet to SHA (Renovate)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init
        run: terraform init -backend-config="key=cv.tfstate"

      - name: terraform validate
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        # TODO: ratchet to SHA (Renovate)
        uses: actions/github-script@v7
        with:
          script: |
            const out = `#### terraform plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show plan</summary>

            \`\`\`
            ${{ toJSON(steps.plan.outputs.stdout) }}
            \`\`\`
            </details>`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: out
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: apply
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production # required reviewer / protection gate
    permissions:
      contents: read
      id-token: write
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC)
        # TODO: ratchet to SHA (Renovate)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: terraform init
        run: terraform init -backend-config="key=cv.tfstate"

      - name: terraform apply
        run: terraform apply -auto-approve -input=false
