# Local secret-scanning gate. Mirrors the CI gitleaks job so leaks are caught
# before they ever reach a (public) commit. Install once: `pre-commit install`.
# CI re-runs gitleaks regardless, so this hook is defence-in-depth, not the only line.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2 # TODO: ratchet via Renovate
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0 # TODO: ratchet via Renovate
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key
