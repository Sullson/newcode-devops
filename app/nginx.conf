# nginx config for the cv-site container.
# - serves the Astro static build on :8080 (non-root-friendly, >1024)
# - /healthz returns 200 for k8s probes
# - a loopback-only :8081 exposes stub_status for the
#   nginx-prometheus-exporter sidecar (scraped on :9113 /metrics)
worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Writable temp paths so the master/workers can run as non-root.
  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  sendfile      on;
  tcp_nopush    on;
  server_tokens off;
  access_log    /dev/stdout;
  error_log     /dev/stderr warn;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Public site.
  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # k8s liveness/readiness — cheap, no filesystem dependency.
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Hashed Astro assets are immutable; cache hard.
    location /_astro/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location / {
      try_files $uri $uri/ $uri.html /index.html;
    }
  }

  # Metrics endpoint — loopback only, scraped by the exporter sidecar.
  server {
    listen 127.0.0.1:8081;
    server_name _;
    location = /stub_status {
      stub_status;
      access_log off;
    }
  }
}
