apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cv-site.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cv-site.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cv-site.selectorLabels" . | nindent 8 }}
        # Tells the Azure Workload Identity webhook to inject the projected
        # token + env into this pod.
        azure.workload.identity/use: "true"
      annotations:
        # Roll pods when image tag is pinned but content changes are not (CI
        # bumps the tag, so this is a belt-and-braces no-op on real deploys).
        kubectl.kubernetes.io/default-container: cv-site
    spec:
      serviceAccountName: {{ include "cv-site.serviceAccountName" . }}
      # App needs the projected Azure token (mounted by the webhook), not the
      # k8s API token.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpreadConstraints.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "cv-site.selectorLabels" . | nindent 14 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # Main container: nginx serving the Astro static output on 8080.
        - name: cv-site
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Non-secret identity for the live /proof.json the entrypoint renders.
          # Downward-API fields are injected by the kubelet (no API token needed,
          # so this works under automountServiceAccountToken: false). The image
          # ref/digest and cluster facts come from Helm at deploy time. The
          # entrypoint writes ONLY these whitelisted fields — it never dumps env.
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: IMAGE_REF
              value: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
            - name: IMAGE_DIGEST
              value: "{{ .Values.image.digest }}"
            - name: CLUSTER_NAME
              value: "{{ .Values.cluster.name }}"
            - name: CLUSTER_REGION
              value: "{{ .Values.cluster.region }}"
            - name: CLUSTER_API_DOMAIN
              value: "{{ .Values.cluster.apiDomain }}"
          ports:
            - name: http
              containerPort: {{ .Values.containerPorts.http }}
              protocol: TCP
            # stub_status is loopback-only; declared for clarity, not exposed.
            - name: stub-status
              containerPort: {{ .Values.containerPorts.stubStatus }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # nginx needs writable temp/cache/run paths under a read-only root FS.
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
        # Sidecar: scrapes 127.0.0.1:8081/stub_status, exposes RED metrics.
        - name: nginx-exporter
          image: "{{ .Values.exporter.image.repository }}:{{ .Values.exporter.image.tag }}"
          imagePullPolicy: {{ .Values.exporter.image.pullPolicy }}
          args:
            - "--nginx.scrape-uri=http://127.0.0.1:{{ .Values.containerPorts.stubStatus }}/stub_status"
            - "--web.listen-address=:{{ .Values.exporter.port }}"
          ports:
            - name: metrics
              containerPort: {{ .Values.exporter.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.exporter.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
