{{- if .Values.observability.enabled }}
# In-cluster, PUBLIC observability for the live window: Prometheus scrapes the
# cv-site exporter (per-pod, via a headless Service + DNS SD — no extra RBAC),
# and an anonymous Grafana renders the live dashboard. Both reachable in a
# browser through the Cloudflare Tunnel (terraform/cloudflare.tf), no Azure login.
# Everything here dies with the cluster at teardown; data is ephemeral by design.
---
# Headless Service: DNS A records resolve to each cv-site pod IP so Prometheus
# scrapes every replica's exporter directly (a ClusterIP would round-robin).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cv-site.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "cv-site.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.exporter.port }}
      targetPort: metrics
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cv-site.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s
    scrape_configs:
      - job_name: cv-site
        dns_sd_configs:
          - names:
              - {{ include "cv-site.fullname" . }}-metrics.{{ .Release.Namespace }}.svc.cluster.local
            type: A
            port: {{ .Values.exporter.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cv-site.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.prometheus.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cv-site.prometheus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cv-site.prometheus.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ .Values.exporter.port | toString | sha256sum }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: "{{ .Values.observability.prometheus.image.repository }}:{{ .Values.observability.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.observability.prometheus.image.pullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.observability.prometheus.retention }}
            - --web.listen-address=:9090
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.observability.prometheus.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: {{ include "cv-site.fullname" . }}-prometheus
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cv-site.fullname" . }}-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.prometheus.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cv-site.prometheus.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
---
# Grafana provisioning: datasource (the in-cluster Prometheus, as default) and a
# file-based dashboard provider. The dashboard JSON is mounted from a ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cv-site.fullname" . }}-grafana-provisioning
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.grafana.labels" . | nindent 4 }}
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "cv-site.fullname" . }}-prometheus.{{ .Release.Namespace }}.svc.cluster.local:9090
        isDefault: true
        editable: false
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: cv-site
        type: file
        disableDeletion: true
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cv-site.fullname" . }}-grafana-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.grafana.labels" . | nindent 4 }}
data:
  cv-site-live.json: |-
{{ .Files.Get "dashboards/cv-site-live.json" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cv-site.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.grafana.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cv-site.grafana.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cv-site.grafana.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/dashboard: {{ .Files.Get "dashboards/cv-site-live.json" | sha256sum }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: "{{ .Values.observability.grafana.image.repository }}:{{ .Values.observability.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.observability.grafana.image.pullPolicy }}
          # Anonymous, read-only viewer — a public dashboard with no login.
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            - name: GF_AUTH_BASIC_ENABLED
              value: "false"
            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "true"
            - name: GF_USERS_DEFAULT_THEME
              value: "light"
            - name: GF_SERVER_ROOT_URL
              value: {{ .Values.observability.grafana.publicUrl | quote }}
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/cv-site-live.json
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
            - name: GF_NEWS_NEWS_FEED_ENABLED
              value: "false"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            {{- toYaml .Values.observability.grafana.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: provisioning
          configMap:
            name: {{ include "cv-site.fullname" . }}-grafana-provisioning
        - name: dashboards
          configMap:
            name: {{ include "cv-site.fullname" . }}-grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cv-site.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.grafana.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cv-site.grafana.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
{{- end }}
