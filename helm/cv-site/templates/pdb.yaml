apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "cv-site.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "cv-site.selectorLabels" . | nindent 6 }}
