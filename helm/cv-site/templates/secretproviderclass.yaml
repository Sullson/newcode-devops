# Secrets Store CSI Driver (Azure provider) wiring. Uses Workload Identity to
# read kv-newcode-cv and SYNC the Cloudflare tunnel token into a k8s Secret that
# cloudflared consumes via env. The token value never lives in this repo.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "cv-site.fullname" . }}-tunnel
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.labels" . | nindent 4 }}
spec:
  provider: azure
  # Mirror the Key Vault object into a native k8s Secret so cloudflared can read
  # it with a plain secretKeyRef env.
  secretObjects:
    - secretName: {{ .Values.tunnel.secretName }}
      type: Opaque
      data:
        - objectName: {{ .Values.tunnel.secretObjectName }}
          key: {{ .Values.tunnel.secretObjectName }}
  parameters:
    # Workload Identity (no SP secret); clientId injected by CI/TF.
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: {{ .Values.tunnel.secretObjectName }}
          objectType: secret
