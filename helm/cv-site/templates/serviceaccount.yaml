apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cv-site.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.labels" . | nindent 4 }}
    # Required by the Azure Workload Identity webhook to project a token.
    azure.workload.identity/use: "true"
  annotations:
    # Binds this SA to the user-assigned managed identity (id-cv-app) via OIDC
    # federation. clientId is injected by CI/TF; never a stored secret.
    azure.workload.identity/client-id: {{ .Values.workloadIdentity.clientId | quote }}
# Do not auto-mount the default API token: the app needs the projected Azure
# identity token, not Kubernetes API access.
automountServiceAccountToken: false
