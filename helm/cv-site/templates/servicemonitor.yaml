{{- if .Values.serviceMonitor.enabled }}
# Azure Managed Prometheus (the ama-metrics addon) scrapes its OWN CRD group,
# azmonitoring.coreos.com/v1 — NOT the upstream Prometheus-Operator group
# monitoring.coreos.com/v1, whose CRD this cluster does not even install. Using
# the Azure group is what makes the exporter sidecar's /metrics actually land in
# amw-newcode-cv and drive the RED dashboard.
apiVersion: azmonitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cv-site.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cv-site.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "cv-site.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}
